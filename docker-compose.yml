version: "3.8"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: bomberos-hidrantes-app
        restart: unless-stopped
        ports:
            - "8000:80"
        environment:
            APP_ENV: production
            APP_DEBUG: "false"
            APP_KEY: ${APP_KEY}
            APP_URL: ${APP_URL}
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
        volumes:
            - ./:/var/www/html
            # Mount storage specifically if needed, but for prod usually use volume mounts or cloud storage
            # - ./storage:/var/www/html/storage
        depends_on:
            - db

    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
