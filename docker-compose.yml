services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rg2eat:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "RG2 Eat"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_TIMEZONE: Europe/Lisbon
      APP_LOCALE: es
      APP_FALLBACK_LOCALE: es

      LOG_CHANNEL: stderr
      LOG_LEVEL: warning

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-rg2_cms}
      DB_USERNAME: ${DB_USERNAME:-rg2_cms}
      DB_PASSWORD: ${DB_PASSWORD:-rg2_cms_pass}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public

      TRUSTED_PROXIES: "*"

      # Lo lee docker/entrypoint.sh
      RUN_MIGRATIONS: "true"
      RUN_SEED: "${RUN_SEED:-false}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persistir las imágenes subidas del menú
      - storage_public:/var/www/html/storage/app/public

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-rg2_cms}
      MARIADB_USER: ${DB_USERNAME:-rg2_cms}
      MARIADB_PASSWORD: ${DB_PASSWORD:-rg2_cms_pass}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rg2_root_pass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  db_data:
  storage_public:
