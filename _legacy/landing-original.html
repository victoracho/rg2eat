<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RG2 Eat — Comida Mexicana · Porto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --coral: #F38067;
    --cream: #FEF2EC;
    --black: #000000;
    --coral-dark: #d9644d;
    --coral-light: #f9c4b5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--black); overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(254,242,236,0.92); backdrop-filter: blur(12px);
    border-bottom: 1.5px solid var(--coral-light); transition: box-shadow .3s;
  }
  nav.scrolled { box-shadow: 0 4px 30px rgba(243,128,103,.18); }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 42px; width: auto; display: block; }
  .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--black); font-size: .9rem; font-weight: 500;
    letter-spacing: .04em; text-transform: uppercase; position: relative; transition: color .2s;
  }
  .nav-links a::after {
    content: ''; position: absolute; left: 0; bottom: -3px; width: 0; height: 2px;
    background: var(--coral); transition: width .25s;
  }
  .nav-links a:hover { color: var(--coral); }
  .nav-links a:hover::after { width: 100%; }
  .nav-reserve {
    background: var(--coral); color: #fff !important; padding: .55rem 1.4rem;
    border-radius: 2px; transition: background .2s !important;
  }
  .nav-reserve:hover { background: var(--coral-dark) !important; }
  .nav-reserve::after { display: none !important; }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex; align-items: center; gap: .3rem;
    background: rgba(243,128,103,.1); border: 1.5px solid var(--coral-light);
    border-radius: 3px; padding: .2rem .3rem;
  }
  .lang-btn {
    background: none; border: none; cursor: pointer;
    font-size: .75rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
    color: #888; padding: .28rem .48rem; border-radius: 2px;
    text-transform: uppercase; letter-spacing: .06em; transition: background .15s, color .15s; line-height: 1;
  }
  .lang-btn:hover { color: var(--coral); }
  .lang-btn.active { background: var(--coral); color: #fff; }
  .lang-sep { color: var(--coral-light); font-size: .7rem; user-select: none; }

  /* HERO */
  .hero {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; padding: 8rem 4rem 4rem; gap: 4rem; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; right: -10%; top: -10%; width: 70%; height: 120%;
    background: radial-gradient(ellipse at center, var(--coral-light) 0%, transparent 70%);
    opacity: .5; pointer-events: none;
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-tag {
    display: inline-block; font-size: .75rem; text-transform: uppercase; letter-spacing: .18em;
    color: var(--coral); font-weight: 500; border: 1.5px solid var(--coral);
    padding: .35rem .9rem; border-radius: 2px; margin-bottom: 1.8rem; animation: fadeUp .6s ease both;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif; font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 1.05; font-weight: 900; color: var(--black); animation: fadeUp .7s .1s ease both;
  }
  .hero h1 em { font-style: italic; color: var(--coral); }
  .hero-sub {
    margin-top: 1.5rem; font-size: 1.1rem; font-weight: 300; line-height: 1.7;
    max-width: 440px; color: #333; animation: fadeUp .7s .2s ease both;
  }
  .hero-ctas { display: flex; gap: 1rem; margin-top: 2.5rem; animation: fadeUp .7s .3s ease both; }
  .btn-primary {
    background: var(--coral); color: #fff; padding: .85rem 2rem; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: .08em; text-decoration: none; display: inline-block;
    border-radius: 2px; transition: background .2s, transform .15s;
  }
  .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }
  .btn-outline {
    background: transparent; color: var(--black); padding: .85rem 2rem;
    border: 1.5px solid var(--black); cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: .9rem; font-weight: 500; text-transform: uppercase; letter-spacing: .08em;
    text-decoration: none; display: inline-block; border-radius: 2px;
    transition: background .2s, color .2s, transform .15s;
  }
  .btn-outline:hover { background: var(--black); color: var(--cream); transform: translateY(-2px); }
  .hero-visual {
    position: relative; display: flex; justify-content: center;
    align-items: center; animation: fadeUp .8s .25s ease both;
  }
  .hero-plate {
    width: min(420px, 90%); aspect-ratio: 1; border-radius: 50%; background: var(--coral);
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
  }
  .hero-plate::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-conic-gradient(from 0deg, rgba(255,255,255,.06) 0deg 30deg, transparent 30deg 60deg);
  }
  .hero-plate-inner {
    font-size: 9rem; filter: drop-shadow(0 8px 24px rgba(0,0,0,.15));
    animation: spin-slow 20s linear infinite; user-select: none;
  }
  .hero-badge {
    position: absolute; top: 1.5rem; right: -1rem; background: var(--black); color: var(--cream);
    padding: .9rem 1.1rem; border-radius: 2px; text-align: center;
    font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 500; line-height: 1.5;
  }
  .hero-badge strong { display: block; font-size: 1.5rem; font-family: 'Playfair Display', serif; font-weight: 900; }

  /* SECTIONS */
  section { padding: 6rem 4rem; }
  .section-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .2em; color: var(--coral); font-weight: 500; margin-bottom: .8rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 900; line-height: 1.1; margin-bottom: 1rem; }

  /* MENU */
  #menu { background: var(--black); color: var(--cream); }
  #menu .section-label { color: var(--coral); }
  #menu .section-title { color: var(--cream); }
  #menu .section-intro { color: #aaa; font-size: 1rem; max-width: 500px; margin-bottom: 3.5rem; font-weight: 300; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 900px; }
  .menu-card {
    background: #111; border: 1.5px solid #222; border-radius: 4px; padding: 2.5rem;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    transition: border-color .25s, transform .2s;
  }
  .menu-card:hover { border-color: var(--coral); transform: translateY(-4px); }
  .menu-card-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .menu-card h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--coral); margin-bottom: .5rem; }
  .menu-card p { font-size: .85rem; color: #888; font-weight: 300; margin-bottom: 1.8rem; line-height: 1.6; }
  .qr-box { background: #fff; padding: 1rem; border-radius: 4px; display: flex; flex-direction: column; align-items: center; gap: .6rem; }
  .qr-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: #555; font-weight: 500; }
  .menu-pdf-link {
    display: inline-block; margin-top: 1rem; font-size: .78rem; color: var(--coral);
    text-decoration: none; text-transform: uppercase; letter-spacing: .1em; font-weight: 500;
    border-bottom: 1px solid transparent; transition: border-color .2s;
  }
  .menu-pdf-link:hover { border-color: var(--coral); }

  /* ABOUT */
  #about { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-visual { position: relative; }
  .about-block {
    background: var(--coral); aspect-ratio: 3/4; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; font-size: 7rem;
    position: relative; overflow: hidden;
  }
  .about-block::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,.06) 20px, rgba(255,255,255,.06) 21px);
  }
  .about-float {
    position: absolute; bottom: -1.5rem; right: -1.5rem; background: var(--black); color: var(--cream);
    padding: 1.5rem 2rem; border-radius: 4px; font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 900; line-height: 1;
  }
  .about-float span { display: block; font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 400; text-transform: uppercase; letter-spacing: .12em; margin-top: .3rem; color: var(--coral); }
  .about-text p { font-size: 1rem; font-weight: 300; line-height: 1.8; color: #333; margin-bottom: 1rem; }
  .about-features { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
  .about-feat { display: flex; align-items: flex-start; gap: .6rem; }
  .feat-icon { font-size: 1.4rem; flex-shrink: 0; }
  .feat-text strong { display: block; font-size: .82rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
  .feat-text span { font-size: .78rem; color: #666; font-weight: 300; }

  /* SOCIAL */
  #social { background: var(--coral); color: var(--cream); text-align: center; }
  #social .section-label { color: rgba(255,255,255,.7); }
  #social .section-title { color: #fff; }
  #social .section-sub { font-size: 1rem; font-weight: 300; color: rgba(255,255,255,.8); margin-bottom: 3rem; }
  .social-grid { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
  .social-card {
    background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.25); border-radius: 4px;
    padding: 2.5rem 3rem; text-decoration: none; color: #fff;
    display: flex; flex-direction: column; align-items: center; gap: 1rem; min-width: 200px;
    transition: background .25s, transform .2s;
  }
  .social-card:hover { background: rgba(255,255,255,.25); transform: translateY(-5px); }
  .social-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
  .social-icon.ig { background: linear-gradient(135deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
  .social-icon.tt { background: #000; }
  .social-card h4 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
  .social-card span { font-size: .8rem; font-weight: 300; opacity: .75; }

  /* LOCATION */
  #location { background: var(--cream); display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
  .location-detail { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--coral-light); }
  .location-detail:last-child { border-bottom: none; }
  .loc-icon { width: 40px; height: 40px; background: var(--coral); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .loc-text strong { display: block; font-size: .78rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 500; margin-bottom: .2rem; }
  .loc-text p { font-size: .92rem; color: #444; font-weight: 300; line-height: 1.5; }
  .loc-text a { color: var(--coral); text-decoration: none; font-weight: 500; }
  .loc-text a:hover { text-decoration: underline; }
  .map-embed { border-radius: 4px; overflow: hidden; border: 2px solid var(--coral-light); box-shadow: 0 12px 40px rgba(243,128,103,.15); position: sticky; top: 5rem; }
  .map-embed iframe { width: 100%; height: 420px; border: none; display: block; }
  .map-cta { display: block; background: var(--coral); color: #fff; text-align: center; padding: 1rem; text-decoration: none; font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 500; transition: background .2s; }
  .map-cta:hover { background: var(--coral-dark); }

  /* FOOTER */
  footer { background: var(--black); color: #555; text-align: center; padding: 2.5rem 4rem; font-size: .8rem; font-weight: 300; }
  footer a { color: var(--coral); text-decoration: none; }
  footer strong { color: var(--cream); }

  /* DECORATIVE */
  .divider { width: 60px; height: 3px; background: var(--coral); margin: 1.2rem 0 2rem; }
  .divider.center { margin: 1.2rem auto 2rem; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1rem; }
    .hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 3rem; gap: 2.5rem; }
    .hero::before { display: none; }
    section { padding: 4rem 1.5rem; }
    .menu-grid { grid-template-columns: 1fr; max-width: 420px; }
    #about { grid-template-columns: 1fr; gap: 3rem; }
    #location { grid-template-columns: 1fr; gap: 3rem; }
    .map-embed { position: static; }
  }
  @media (max-width: 640px) {
    .nav-links li.hide-mobile { display: none; }
    .hero h1 { font-size: 2.8rem; }
    .about-features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <a href="#home" class="nav-logo">
    <img src="https://www.rg2eat.com/assets/images/rg2-logo.svg" alt="RG2 Eat">

  <ul class="nav-links">

    <li><a href="https://www.instagram.com/rg2eat/" target="_blank" class="nav-reserve" data-i18n="nav_reserve"></a></li>
    <li>

// ─────────────────────────────────────────
//  DETECT LANGUAGE
//  1. URL path  /en/ /es/ /pt/
//  2. ?lang= querystring
//  3. Browser language
//  4. Default 'es'
// ─────────────────────────────────────────
function detectLang() {
  const supported = ['en','es','pt'];
  const pathMatch = window.location.pathname.match(/\/(en|es|pt)(\/|$)/i);
  if (pathMatch && supported.includes(pathMatch[1].toLowerCase())) return pathMatch[1].toLowerCase();
  const qs = new URLSearchParams(window.location.search).get('lang');
  if (qs && supported.includes(qs.toLowerCase())) return qs.toLowerCase();
  const browser = (navigator.language || '').slice(0,2).toLowerCase();
  if (supported.includes(browser)) return browser;
  return 'es';
}

// ─────────────────────────────────────────
//  APPLY LANGUAGE
// ─────────────────────────────────────────
let currentLang = detectLang();

function applyLang(lang) {
  currentLang = lang;
  const t = T[lang];
  if (!t) return;
  document.documentElement.lang = lang;
  document.title = t.page_title;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t[el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = t[el.dataset.i18nHtml];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  // Update URL without reload
  const url = new URL(window.location.href);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url.toString());
}

// ─────────────────────────────────────────
//  LANG BUTTON EVENTS
// ─────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

});

  entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
}, { threshold: 0.12 });

  obs.observe(el);
});
